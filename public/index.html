<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASLAW Chatbot - Public</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            min-height: 100vh;
            margin: 0;
        }

        #chat-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            height: 85vh;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
        }

        .header p {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 14px;
        }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 14px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-in-out;
            word-wrap: break-word;
        }

        .user {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: #f1f3f6;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .category {
            font-size: 0.75rem;
            color: #667eea;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .typing {
            padding: 5px 0;
        }

        .typing span {
            height: 8px;
            width: 8px;
            margin: 0 2px;
            background: #555;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        #input-area {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
<div id="chat-container">
    <div class="header">
        <h1>ASLAW Chatbot</h1>
        <p>Malaysian Legal Assistant</p>
    </div>

    <div id="messages"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask a Malaysian law question...">
        <button onclick="sendQuestion()">Ask</button>
    </div>
</div>

<script>
const input = document.getElementById('user-input');
const messages = document.getElementById('messages');
const button = document.querySelector('button');

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendQuestion();
});

async function sendQuestion() {
    const question = input.value.trim();
    if (!question) return;

    // Show user message
    messages.innerHTML += `
        <div class="message user">
            ${escapeHtml(question)}
        </div>`;

    input.value = '';
    input.disabled = true;
    button.disabled = true;

    // Show typing animation
    const loadingDiv = document.createElement('div');
    loadingDiv.className = "message bot";
    loadingDiv.id = "loading-message";
    loadingDiv.innerHTML = `
        <div class="typing">
            <span></span><span></span><span></span>
        </div>
    `;
    messages.appendChild(loadingDiv);
    messages.scrollTop = messages.scrollHeight;

    try {
        const response = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question })
        });

        const data = await response.json();

        // Remove typing animation
        document.getElementById("loading-message")?.remove();

        // Show bot response
        messages.innerHTML += `
            <div class="message bot">
                <div class="category">Category: ${escapeHtml(data.category)}</div>
                ${escapeHtml(data.answer).replace(/\n/g, "<br>")}
            </div>`;

    } catch (error) {
        document.getElementById("loading-message")?.remove();
        messages.innerHTML += `
            <div class="message bot" style="color:red;">
                ❌ Server connection error. Please try again.
            </div>`;
    }

    input.disabled = false;
    button.disabled = false;
    input.focus();
    messages.scrollTop = messages.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
    input.focus();
    messages.scrollTop = messages.scrollHeight;
}
</script>
</body>
</html>
